services:
  app:
    build: .
    container_name: sgd-app
    restart: always
    env_file: 
      - .env 
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 3306
      SECRET: ${SECRET}
      ADMIN_DEFAULT_LOGIN: ${ADMIN_DEFAULT_LOGIN}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_ACTIVATION_URL: ${FRONTEND_ACTIVATION_URL}
    depends_on:
      db:
        condition: service_healthy

  #front:
   # build:
    #  context: ./front_end
    #  dockerfile: Dockerfile
    #container_name: sgd-front
    #ports:
    #  - "4200:4200"
    #stdin_open: true
    #tty: true
    # depends_on:
    #   - app      

  db:
    image: mysql:8.0
    container_name: sgd-db
    restart: always
    env_file: 
      - .env 
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
